[build]
  command = "npm run build"
  publish = "dist"

# ─── Sanity webhook → Netlify rebuild ─────────────────────────────────────────
# SETUP (hacer una sola vez):
#   1. Netlify → Site settings → Build & deploy → Build hooks → "Add build hook"
#      Nombre: "Sanity publish"  Branch: main  → copiar la URL generada
#   2. sanity.io/manage → proyecto lmfef6xr → API → Webhooks → "Add webhook"
#      Name: "Netlify rebuild"
#      URL: pegar la URL del paso 1
#      Trigger on: "Create", "Update", "Delete"  Dataset: production
#      Filter: _type == "configSitio" || _type == "noticia" || _type == "parroquia" || _type == "documentoOficial"
#   Con esto, cada vez que publiques en Sanity, Netlify rebuildeará automáticamente.

# ─── Security Headers — todas las rutas ───────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # HSTS: 2 años, incluir subdominios, preload
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # CSP — solo self + dominios estrictamente necesarios
    # Sanity CDN: cdn.sanity.io (assets), api.sanity.io (GROQ), *.sanity.io (studio embeds si aplica)
    # Google Analytics 4: *.google-analytics.com, *.googletagmanager.com
    # Trade-off: 'unsafe-inline' estilos no está — Tailwind v4 inyecta <style> en SSR;
    # se habilita 'unsafe-inline' solo en style-src ya que CSP L3 nonces requieren SSR dinámico por request.
    Content-Security-Policy = "default-src 'none'; script-src 'self' 'sha256-L+tqfrulmhaidEcHPc7vuiFX4l1lkIjG0X20R9XIDfk=' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://cdn.sanity.io https://www.google-analytics.com; connect-src 'self' https://api.sanity.io https://cdn.sanity.io https://www.google-analytics.com https://region1.google-analytics.com; media-src 'self' https://cdn.sanity.io; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests; block-all-mixed-content;"

    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    # Cross-Origin-Embedder-Policy omitido intencionalmente:
    # require-corp bloquea imágenes de cdn.sanity.io que no envían CORP headers.
    # Este header solo es necesario para SharedArrayBuffer/WASM — funcionalidad que
    # este portal institucional no utiliza.

    # Permissions-Policy — sitio institucional: sin acceso a sensores/dispositivos
    Permissions-Policy = "accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), fullscreen=(self), gamepad=(), geolocation=(), gyroscope=(), hid=(), idle-detection=(), local-fonts=(self), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), serial=(), speaker-selection=(), usb=(), web-share=(self), xr-spatial-tracking=()"

# ─── Cache: assets con hash de contenido (Astro los genera con fingerprint) ───
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Cache: imágenes estáticas del directorio public/ ─────────────────────────
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# ─── Cache: JS estáticos de public/js/ ───────────────────────────────────────
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# ─── Sin caché en API routes ──────────────────────────────────────────────────
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
