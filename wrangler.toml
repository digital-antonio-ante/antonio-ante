# ─── Cloudflare Workers — GAD Antonio Ante ────────────────────────────────────
# Deployment: Workers with Assets (modelo unificado 2025)
# Deploy command en dashboard: npx wrangler deploy

name = "antonio-ante"
compatibility_date = "2025-01-01"

# nodejs_compat: habilita APIs de Node.js en el Worker (requerido por @sanity/client)
compatibility_flags = ["nodejs_compat"]

# ─── Webhook de Sanity → redeploy (hacer una sola vez) ────────────────────────
# SETUP:
#   1. Cloudflare Dashboard → Workers → antonio-ante → Settings → Deploy hooks
#      → "Add deploy hook"  Nombre: "Sanity publish" → copiar la URL generada
#   2. sanity.io/manage → proyecto lmfef6xr → API → Webhooks → "Add webhook"
#      Name: "Cloudflare rebuild"
#      URL: pegar la URL del paso 1
#      Trigger on: "Create", "Update", "Delete"  Dataset: production
#      Filter: _type == "configSitio" || _type == "noticia" || _type == "parroquia" || _type == "documentoOficial"
# ──────────────────────────────────────────────────────────────────────────────
